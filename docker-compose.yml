version: "3.8"

services:
  agent-orchestrator:
    build: 
      context: ./agent
    container_name: agentic-orchestrator
    ports:
      - "8000:8000"
    environment:
      - OPENROUTER_API_KEY=${OPENROUTER_API_KEY}
      - NEO4J_URI=bolt://neo4j-graph:7687
      - NEO4J_USER=${NEO4J_USER:-neo4j}
      - NEO4J_PASSWORD=${NEO4J_PASSWORD:-password}
      - JAVA_HOOKS_URL=http://java-enterprise-hooks:8080
      - AZURE_SUBSCRIPTION_ID=${AZURE_SUBSCRIPTION_ID}
    volumes:
      - ./agent:/app
    depends_on:
      - neo4j-graph

  control-plane-ui:
    build:
      context: ./ui
    container_name: agentic-ui
    ports:
      - "3000:3000"
    environment:
      - REACT_APP_AGENT_API_URL=http://localhost:8000
    volumes:
      - ./ui/src:/app/src
    depends_on:
      - agent-orchestrator

  java-enterprise-hooks:
    build:
      context: ./java-hooks
    container_name: enterprise-hooks
    ports:
      - "8080:8080"

  neo4j-graph:
    image: neo4j:5.9.0
    container_name: agentic-neo4j
    ports:
      - "7474:7474"
      - "7687:7687"
    environment:
      - NEO4J_AUTH=${NEO4J_USER:-neo4j}/${NEO4J_PASSWORD:-password}
    volumes:
      - neo4j_data:/data

volumes:
  neo4j_data:
